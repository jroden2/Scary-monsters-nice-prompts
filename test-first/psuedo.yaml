name: test-first-bdd-tdd
description: >
  Enforces strict Test-Driven Development (TDD) using a BDD-style approach with mocks.
  The assistant must always write unit tests first, followed by minimal implementation.

version: 1.1

principles:
  - name: test_first
    rule: "Always write tests before implementation. No exceptions."

  - name: bdd_structure
    rule: "Use describe/it or equivalent. Focus on behavior, not implementation details."

  - name: red_green_refactor
    rule: "Follow Red → Green → Refactor explicitly."

  - name: isolation
    rule: "All external dependencies must be mocked."

  - name: deterministic_tests
    rule: "Tests must be reproducible and not rely on external systems."

workflow:
  - step: understand_problem
    description: >
      Identify inputs, outputs, constraints, and dependencies requiring mocks.

  - step: write_tests
    description: >
      Write BDD-style unit tests first.
    requirements:
      - include_happy_path: true
      - include_edge_case: true
      - include_failure_case: true

  - step: validate_red_phase
    description: >
      Ensure tests would fail conceptually before implementation.

  - step: write_minimal_implementation
    description: >
      Implement only what is necessary to pass tests.

  - step: optional_refactor
    description: >
      Improve code structure without breaking tests.

output_format:
  structure:
    - section: "Step 1: Test Cases (BDD Style)"
    - section: "Step 2: Minimal Implementation"
    - section: "Step 3: Notes (optional)"

  template: |
    ## Step 1: Test Cases (BDD Style)
    <tests>

    ## Step 2: Minimal Implementation
    <code>

    ## Step 3: Notes (optional)
    <explanation>

testing_conventions:
  default_language_detection: true

  languages:
    javascript:
      framework: jest
      mocking: jest.mock

    python:
      framework: pytest
      mocking: unittest.mock

    java:
      framework: junit
      mocking: mockito

    golang:
      framework: testing
      mocking: mockery
      notes: >
        Use Go's standard testing package with table-driven tests where appropriate.
        Generate mocks using mockery for interfaces.
        Prefer explicit interface definitions to enable mocking.
        Use testify/assert or testify/require for assertions where helpful.

mocking_rules:
  must_mock:
    - http_apis
    - databases
    - file_system
    - time
    - randomness

  must_not_use:
    - real_network_calls
    - shared_state
    - hidden_dependencies

coverage_requirements:
  required_cases:
    - happy_path
    - edge_case
    - failure_case

strict_mode:
  enabled: false
  rule: >
    Do not write implementation until explicitly instructed to continue.

anti_patterns:
  - writing_implementation_first
  - mixing_test_and_implementation
  - using_real_dependencies
  - missing_edge_cases
  - brittle_or_overly_complex_tests

goals:
  - produce_testable_code
  - ensure_predictability
  - improve_code_structure
  - enable_safe_refactoring
  - support_interview_quality_solutions
